version: 2

models:
  - name: stg_rescue__animales
    description: "Capa Staging de animales. Estandarización de especies, cruce de razas y validación de reglas biológicas (peso/edad)"
    columns:
      - name: animal_key
        description: "Clave primaria única de la tabla creada con md5"
        tests:
          - unique
          - not_null

      - name: animal_id
        description: "ID original del sistema de origen"
        tests:
          - not_null

      - name: especie_animal
        description: "Especie del animal corregida y estandarizada"
        tests:
          - not_null
          - accepted_values:
              values: ['PERRO', 'GATO', 'AVE', 'CONEJO', 'HAMSTER', 'EXÓTICO', 'DESCONOCIDO', 'ERROR']
              quote: true

      - name: raza_animal
        description: "Raza del animal limpia tras cruzar con la Seed"
        tests:
          - not_null

      - name: sexo_animal
        description: "Género del animal."
        tests:
          - not_null
          - accepted_values:
              values: ['MACHO', 'HEMBRA', 'DESCONOCIDO']
              quote: true

      # No ponemos 'not_null' en fecha_nacimiento o peso_kg porque las convertimos a null si eran inválidas.

  
  - name: stg_rescue__usuarios
    description: "Capa Staging de usuarios deduplicada por Email, Teléfono y Nombre. Incluye validación de rangos de edad"
    columns:
      - name: user_key
        data_type: varchar
        description: "Clave primaria única de la tabla creada con md5"
        tests:
          - unique
          - not_null

      - name: user_id
        data_type: varchar
        description: "iID original proveniente del sistema de gestión del refugio"

      - name: nombre_completo
        data_type: varchar
        description: "Nombre y apellidos del usuario"
        tests:
          - not_null

      - name: genero_usuario
        data_type: varchar
        description: "Sexo del usuario"
        tests:
          - accepted_values:
              values: ['MASCULINO', 'FEMENINO', 'DESCONOCIDO']

      - name: fecha_nacimiento
        data_type: date
        description: "fecha de nacimiento del usuario"

      - name: email
        data_type: varchar
        description: "email de los usuarios"
        tests:
          - dbt_utils.at_least_one        # Opcional: para asegurar que no todos son nulos

      - name: telefono
        data_type: varchar
        description: "Número de teléfono normalizado a 9 dígitos"

      - name: codigo_postal
        data_type: varchar
        description: "Código postal español validado"

      - name: profesion
        data_type: varchar
        description: "Profesión declarada por el usuario"

      - name: tipo_usuario
        data_type: varchar
        description: "Rol principal del usuario en el sistema"
        tests:
          - accepted_values:
              values: ['ADOPTANTE', 'VOLUNTARIO', 'DONANTE', 'SIN TIPO']
              quote: true

      - name: canal_captacion
        data_type: varchar
        description: "Origen por el cual el usuario conoció la protectora"

      - name: es_socio
        data_type: boolean
        description: "Indicador booleano (TRUE/FALSE)"
        tests:
          - not_null

      - name: fecha_alta_at
        data_type: date
        description: "Fecha en la que el usuario se registró por primera vez"

      - name: ingested_at
        data_type: timestamp_ntz
        description: "Timestamp técnico de cuándo se cargó el dato en la capa Bronze"


  - name: stg_rescue__visitas_medicas
    description: "Tabla de staging para las visitas médicas. Limpia y normaliza motivos, diagnósticos y costes"
    columns:    
      - name: visita_medica_key
        data_type: varchar
        description: "Clave primaria subrogada única para cada versión de la visita."
        tests:
          - unique
          - not_null

      - name: visita_id
        data_type: varchar
        description: "Identificador natural de la visita procedente del origen."
        tests:
          - not_null

      - name: animal_id
        data_type: varchar
        description: "ID del animal atendido. (Nota: Se permite que no cruce con la tabla animales para no perder el registro del gasto financiero)."

      - name: sede_id
        data_type: varchar
        description: "ID de la sede o clínica veterinaria."

      - name: fecha_visita
        data_type: timestamp_ntz
        description: "Fecha de la visita médica"
        tests:
          - not_null

      - name: motivo_visita
        data_type: varchar
        description: "Motivo principal de la visita, normalizado a mayúsculas."

      - name: diagnostico
        data_type: varchar
        description: "Diagnóstico médico de la visita."

      - name: coste_visita
        data_type: varchar
        description: "Coste de la intervención en valor absoluto (siempre positivo)."
        tests:
          - not_null


  - name: stg_rescue__donations
    description: "Tabla de staging para las donaciones. Extrae datos del JSON y limpia importes y métodos de pago."
    columns:
      - name: donation_key
        description: "Clave primaria subrogada única para la donación"
        tests:
          - unique
          - not_null

      - name: transaction_id
        description: "ID natural de la transacción"
        tests:
          - unique
          - not_null

      - name: user_id
        description: "ID del usuario que realiza la donación. Puede ser NULL si es anónima"

      - name: donation_amount
        description: "Importe neto de la donación (limpio de símbolos de moneda)"
        tests:
          - not_null

      - name: payment_method
        description: "Método de pago normalizado (TARJETA, PAYPAL)"

      - name: campaign_name
        description: "Nombre de la campaña a la que va dirigida la donación"

      - name: campaign_budget
        description: "Objetivo económico de la campaña asociada"


  - name: stg_rescue__sedes
    description: "Tabla de staging para las sedes y refugios. Limpia nombres, normaliza teléfonos, corrige formatos de CP y estandariza estados booleanos."
    columns:
      - name: sede_key
        description: "Clave primaria subrogada única para la sede"
        tests:
          - unique
          - not_null

      - name: sede_id
        description: "ID natural de la sede (SD-XXX)"
        tests:
          - unique
          - not_null

      - name: nombre_sede
        description: "Nombre del refugio o clínica, normalizado con mayúsculas capitales"
        tests:
          - not_null

      - name: capacidad_maxima
        description: "Capacidad total de animales"
        tests:
          - not_null

      - name: codigo_postal
        description: "Código postal"

      - name: is_active
        description: "Indica si la sede está operativa actualmente (booleano normalizado)"
        tests:
          - not_null


  - name: stg_rescue__zip_codes
    description: "Tabla maestra de códigos postales y coordenadas. Se usa como fuente de la verdad para validar las ubicaciones geográficas"
    columns:
      - name: zip_code_key
        description: "Clave primaria subrogada única"
        tests:
          - unique
          - not_null

      - name: zip_code
        description: "Código postal oficial de 5 dígitos"
        tests:
          - unique
          - not_null

      - name: city_name
        description: "Nombre de la ciudad o municipio"
        tests:
          - not_null

      - name: province_name
        description: "Nombre de la provincia"
        tests:
          - not_null

      - name: latitude
        description: "Latitud geográfica para mapas"

      - name: longitude
        description: "Longitud geográfica para mapas"